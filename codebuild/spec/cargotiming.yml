version: 0.2
env:
  shell: bash
  variables:
    # This assumes you have a Rust toolchain installed
    CARGO: "cargo +nightly"
phases:
  install:
    commands:
      - which cargo || true
      - echo "Installing Rust ..."
      - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - . $HOME/.cargo/env
      - rustup toolchain install 1.74.1-x86_64-unknown-linux-gnu
  build:
    commands:
      - cargo build --timings
  post_build:
    commands:
      - cargo test --exclude s2n-quic-platform --workspace

artifacts:
  # upload timing reports
  files:
    - '**/*'
  base-directory: target/cargo-timings

