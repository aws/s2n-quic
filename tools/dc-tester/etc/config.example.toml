# RPC Tester Configuration
#
# Usage:
#   Server: cargo run --bin rpc-tester -- server --config etc/config.example.toml
#   Client: cargo run --bin rpc-tester -- client --config etc/config.example.toml

[server]
address = "[::]:4433"

[client]
# Each workload defines a traffic pattern.
# Sizes can be a fixed value or a random range sampled per request:
#   request_size = 1024
#   request_size = { min = 64, max = 1048576 }

# --- tiny: 64 B – 1 KiB ---

[[client.workloads]]
name = "tiny-bidi"
workers = 1000
request_size = { min = 64, max = 1024 }
response_size = { min = 64, max = 1024 }

[[client.workloads]]
name = "tiny-request"
workers = 1000
request_size = { min = 64, max = 1024 }
response_size = 1024

[[client.workloads]]
name = "tiny-response"
workers = 1000
request_size = 1024
response_size = { min = 64, max = 1024 }

# --- small: 1 KiB – 64 KiB ---

[[client.workloads]]
name = "small-bidi"
workers = 100
request_size = { min = 1024, max = 65536 }
response_size = { min = 1024, max = 65536 }

[[client.workloads]]
name = "small-request"
workers = 100
request_size = { min = 1024, max = 65536 }
response_size = 1024

[[client.workloads]]
name = "small-response"
workers = 100
request_size = 1024
response_size = { min = 1024, max = 65536 }

# --- medium: 64 KiB – 1 MiB ---

[[client.workloads]]
name = "medium-bidi"
workers = 10
request_size = { min = 65536, max = 1048576 }
response_size = { min = 65536, max = 1048576 }

[[client.workloads]]
name = "medium-request"
workers = 10
request_size = { min = 65536, max = 1048576 }
response_size = 1024

[[client.workloads]]
name = "medium-response"
workers = 10
request_size = 1024
response_size = { min = 65536, max = 1048576 }

# --- large: 1 MiB – 128 MiB ---

[[client.workloads]]
name = "large-bidi"
workers = 4
request_size = { min = 1048576, max = 134217728 }
response_size = { min = 1048576, max = 134217728 }

[[client.workloads]]
name = "large-request"
workers = 4
request_size = { min = 1048576, max = 134217728 }
response_size = 1024

[[client.workloads]]
name = "large-response"
workers = 4
request_size = 1024
response_size = { min = 1048576, max = 134217728 }

# --- xlarge: 128 MiB – 4 GiB ---

[[client.workloads]]
name = "xlarge-bidi"
workers = 1
request_size = { min = 134217728, max = 4294967296 }
response_size = { min = 134217728, max = 4294967296 }

[[client.workloads]]
name = "xlarge-bidi-msg"
workers = 1
use_msg = true
request_size = { min = 134217728, max = 4294967296 }
response_size = { min = 134217728, max = 4294967296 }

[[client.workloads]]
name = "xlarge-request"
workers = 1
request_size = { min = 134217728, max = 4294967296 }
response_size = 1024

[[client.workloads]]
name = "xlarge-request-msg"
workers = 1
use_msg = true
request_size = { min = 134217728, max = 4294967296 }
response_size = 1024

# 100 concurrent bulk uploaders contending the shared recv credit pool. Tests fair-share of BW,
# whether aggregate BW stays saturated under contention, and whether any stream starves (per-chunk
# 10s watchdog fires → "writer/reader did not produce a chunk").
[[client.workloads]]
name = "xlarge-request-100"
workers = 100
request_size = { min = 134217728, max = 4294967296 }
response_size = 1024

# Same as xlarge-request-100 but exercising the write_msg (QueueMsg) path instead of write_from
# (QueueData), to validate per-frame coop yielding across the segmented message path under
# contention.
[[client.workloads]]
name = "xlarge-request-100-msg"
workers = 100
use_msg = true
request_size = { min = 134217728, max = 4294967296 }
response_size = 1024

[[client.workloads]]
name = "xlarge-response"
workers = 1
request_size = 1024
response_size = { min = 134217728, max = 4294967296 }

[[client.workloads]]
name = "xlarge-response-msg"
workers = 1
use_msg = true
request_size = 1024
response_size = { min = 134217728, max = 4294967296 }

# --- paxos: multi-phase consensus workload ---
# Each round runs PREPARE → ACCEPT → LEARN sequentially.
# Within each phase, messages fan out in parallel to all acceptors.

[[client.workloads]]
name = "paxos-3"
workers = 50
paxos.acceptors = 3
paxos.prepare = { request_size = 1024, response_size = 100 }
paxos.accept = { request_size = 102400, response_size = 100 }
paxos.learn = { request_size = 100, response_size = 100 }

[[client.workloads]]
name = "paxos-5"
workers = 50
paxos.acceptors = 5
paxos.prepare = { request_size = 1024, response_size = 1024 }
paxos.accept = { request_size = 102400, response_size = 1024 }
paxos.learn = { request_size = 100, response_size = 100 }

[[client.workloads]]
name = "paxos-3-small"
workers = 50
paxos.acceptors = 3
paxos.prepare = { request_size = 1024, response_size = 100 }
paxos.accept = { request_size = 1024, response_size = 100 }
paxos.learn = { request_size = 100, response_size = 100 }

[[client.workloads]]
name = "paxos-3-small-45"
workers = 45
paxos.acceptors = 3
paxos.prepare = { request_size = 1024, response_size = 100 }
paxos.accept = { request_size = 1024, response_size = 100 }
paxos.learn = { request_size = 100, response_size = 100 }

[[client.workloads]]
name = "paxos-5-variable"
workers = 20
paxos.acceptors = 5
paxos.prepare = { request_size = { min = 512, max = 2048 }, response_size = { min = 512, max = 2048 } }
paxos.accept = { request_size = { min = 50000, max = 150000 }, response_size = { min = 512, max = 2048 } }
paxos.learn = { request_size = { min = 64, max = 200 }, response_size = { min = 64, max = 200 } }

# --- paxos with write_msg API ---

[[client.workloads]]
name = "paxos-3-msg"
workers = 50
use_msg = true
paxos.acceptors = 3
paxos.prepare = { request_size = 1024, response_size = 100 }
paxos.accept = { request_size = 102400, response_size = 100 }
paxos.learn = { request_size = 100, response_size = 100 }

[[client.workloads]]
name = "paxos-3-small-msg"
workers = 50
use_msg = true
paxos.acceptors = 3
paxos.prepare = { request_size = 1024, response_size = 100 }
paxos.accept = { request_size = 1024, response_size = 100 }
paxos.learn = { request_size = 100, response_size = 100 }

[[client.workloads]]
name = "paxos-3-large-msg"
workers = 50
use_msg = true
paxos.acceptors = 3
paxos.prepare = { request_size = 1024, response_size = 100 }
paxos.accept = { request_size = 52428800, response_size = 100 }
paxos.learn = { request_size = 100, response_size = 100 }
