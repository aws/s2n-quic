[package]
name = "dc-tester"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
clap = { version = "4", features = ["derive"] }
libc = "0.2"
tikv-jemallocator = { version = "0.6", features = ["profiling"] }
tikv-jemalloc-ctl = { version = "0.6", features = ["profiling", "stats"] }
tikv-jemalloc-sys = { version = "0.6", features = ["profiling"] }
s2n-quic = { path = "../../quic/s2n-quic", features = ["unstable-provider-dc", "unstable-provider-random"] }
s2n-quic-dc = { path = "../../dc/s2n-quic-dc", features = ["tokio"] }
s2n-quic-core = { path = "../../quic/s2n-quic-core", features = ["testing", "state-tracing"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "registry"] }
dial9-tokio-telemetry = { version = "0.3", features = ["tracing-layer", "cpu-profiling"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(tokio_unstable)'] }
