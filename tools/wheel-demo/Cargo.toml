[package]
name = "wheel-demo"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
bytes = "1"
clap = { version = "4", features = ["derive"] }
libc = "0.2"
tikv-jemallocator = { version = "0.6", features = ["profiling"] }
tikv-jemalloc-ctl = { version = "0.6", features = ["profiling", "stats"] }
tikv-jemalloc-sys = { version = "0.6", features = ["profiling"] }
s2n-codec = { path = "../../common/s2n-codec" }
s2n-quic-dc = { path = "../../dc/s2n-quic-dc", features = ["tokio", "testing"] }
s2n-quic-core = { path = "../../quic/s2n-quic-core" }
s2n-quic-platform = { path = "../../quic/s2n-quic-platform" }
tokio = { version = "1", features = ["full", "rt-multi-thread"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
parking_lot = "0.12"
