[package]
name = "s2n-quic-tls"
version = "0.83.0"
description = "Internal crate used by s2n-quic"
repository = "https://github.com/aws/s2n-quic"
authors = ["AWS s2n"]
edition = "2021"
rust-version = "1.92"
license = "Apache-2.0"
# Exclude corpus files when publishing to crates.io
exclude = ["corpus.tar.gz"]

[features]
fips = ["s2n-quic-crypto/fips", "s2n-tls/fips"]
unstable_client_hello = []
unstable_private_key = []

[dependencies]
bytes = { version = "1", default-features = false }
errno = "0.3"
libc = "0.2"
s2n-codec = { version = "=0.83.0", path = "../../common/s2n-codec", default-features = false }
s2n-quic-core = { version = "=0.83.0", path = "../s2n-quic-core", default-features = false, features = ["alloc"] }
s2n-quic-crypto = { version = "=0.83.0", path = "../s2n-quic-crypto", default-features = false }
# the `on_key_exchange_group` event relies on an API added in 0.3.15
# s2n-tls v0.3.31 and beyond allows setting multiple application context to a TLS connection
# s2n-tls v0.3.40 and beyond builds on Windows (via the GNU/MinGW toolchain)
s2n-tls = { version = "0.3.40", features = ["quic"] }

[dev-dependencies]
checkers = "0.7"
pin-project = { version = "1" }
aws-lc-rs = "1.12"
s2n-quic-core = { path = "../s2n-quic-core", features = ["testing"] }
s2n-quic-rustls = { path = "../s2n-quic-rustls" }

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = [
    'cfg(s2n_quic_enable_pq_tls)',
]
